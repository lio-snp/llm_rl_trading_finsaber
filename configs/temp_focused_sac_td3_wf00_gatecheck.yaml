data_source: finsaber
finsaber_price_path: E:/LLM升级路/复现/FINSABER-main/data/price/all_sp500_prices_2000_2024_delisted_include.csv
assets:
  - TSLA
  - NFLX
  - AMZN
  - MSFT
indicators:
  - sma_5
  - sma_10
  - rsi_14
  - vol_5
global_features:
  - cash
  - portfolio_value
task_description: "finsaber_native focused wf_window_00 rerun for sac/td3 G2 gate and promotion validation."
start_date: "2000-01-03"
end_date: "2024-12-31"
seed: 42

experiment:
  phase: E7
  claim_id: finsaber_native_focus_sac_td3_wf00_gatecheck
  hypothesis_id: h_finsaber_native_focus_sac_td3_wf00_gatecheck
  frozen: false

eval_protocol: temporal_split
window_setup: selected_4
benchmark_range:
  start: "2014-01-01"
  end: "2024-01-01"
prior_years_max: 3

days: 252
initial_cash: 100000
max_trade: 1000
fee_rate: 0.001

algorithm: sac
eval_algorithms:
  - sac
  - td3
groups:
  - G0_baseline
  - G1_revise_only
  - G2_intrinsic_only
  - G3_revise_intrinsic

intrinsic_w: 0.02
intrinsic_w_schedule:
  - 0.02
intrinsic_scale_mode: bounded_100
intrinsic_timing: pre_action_state
intrinsic_postprocess:
  mode: centered
  eps: 1.0e-06
n_small: 40
n_full: 504
warmup_ratio: 0.05
seeds:
  - 1
  - 2
  - 3
  - 4
  - 5

algo_tuning:
  a2c:
    ent_coef: 0.005
    n_steps: 32
  ppo:
    ent_coef: 0.005
    n_steps: 64
    batch_size: 64
  sac:
    ent_coef: auto_0.1
    target_entropy: auto
    batch_size: 128
    learning_rate: 0.0002
  td3:
    actor_max_action: 50
    policy_noise: 0.1
    noise_clip: 0.25
    policy_freq: 2

use_finagent_signal: false
finagent_weight: 0.0

universe:
  mode: historical_dynamic
  n_assets: 5
  include_delisted: true
  restrict_to_config_assets: false
  allow_auto_asset_pool: true
  selection_strategy: momentum_factor
  momentum_days: 100
  skip_days: 21

execution:
  drl_backend: finsaber_native
  decision_price: close_t
  fill_price: open_t1
  continuous_action_bound_penalty:
    coef: 0.05
    threshold: 0.8
    power: 2.0
  finsaber_native:
    hmax: 1000
    buy_cost_pct: 0.0049
    sell_cost_pct: 0.0049
    reward_scaling: 1.0e-4
    use_turbulence: true
    use_vix: false
    deterministic_eval: true
    eval_episodes: 1

evaluation:
  eval_freq_mode: relative
  eval_points_min: 5

bootstrap:
  enabled: true
  n_resamples: 2000
  alpha: 0.05
  random_seed: 42

walk_forward:
  enabled: true
  aggregate: mean_std
  min_days_per_split: 20
  windows:
    - train:
        start: "2011-01-01"
        end: "2012-12-31"
      val:
        start: "2013-01-01"
        end: "2013-12-31"
      test:
        start: "2014-01-01"
        end: "2015-12-31"

td3:
  start_timesteps: 100
  batch_size: 64
  expl_noise: 0.1
  discount: 0.99
  tau: 0.005
  policy_noise: 0.1
  noise_clip: 0.25
  policy_freq: 2
  hidden_dim: 256
  state_norm:
    mode: zscore
    eps: 1.0e-06
    log_volume: true
  actor_max_action: 50

llm:
  enabled: true
  base_url: https://api.deepseek.com
  model: deepseek-chat
  temperature: 0.2
  max_tokens: 3500
  request_timeout_s: 90
  k: 3
  iterations: 3
  iteration_mode: per_algorithm_branches
  branch_parallel_workers: 2
  max_retries: 4
  use_env_proxy: false
  max_failed_calls: 16
  consensus_promotion:
    support_min: 1
    candidate_reject_floor: -0.20
    state_pick_floor: -0.15
    intrinsic_pick_floor: -0.10
    joint_pick_floor: -0.15
    td3_intrinsic_probe_floor: -0.05
  candidate_scoring:
    performance_mode: delta_to_g0
    performance_metric: sharpe
    performance_weight: 1.0
    lipschitz_weight: 0.2
    lipschitz_quantile: 0.9
    lipschitz_max_pairs: 256
    selection_seed_count: 1
    algo_probe_steps_floor:
      sac: 120
      td3: 180
    algo_probe_seed_floor:
      sac: 2
      td3: 3
  generation_target: scenario_family
  scenario_family:
    enabled: true
    families:
      - trend_follow
      - mean_revert
      - risk_shield
    candidates_per_family_per_iter: 1
  system_prompt_mode: trading_lesr_prior_v1
  system_prompt_disable_priors: false
  system_prompt_extra: "Use per-algorithm independent G1/G2/G3 promotion under the native FINSABER state contract only; keep prompts compact and avoid generic schema assumptions."

sb3:
  total_timesteps: 504
  learning_rate: 0.0003
  gamma: 0.99
  batch_size: 64
  ent_coef: 0.0
  eval_episodes: 1

diagnostics:
  dump_sb3_action_trace: true
  robust_ratio_floor: 1.0
