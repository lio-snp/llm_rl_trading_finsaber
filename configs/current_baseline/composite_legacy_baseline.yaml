data_source: finsaber
finsaber_price_path: ../复现/FINSABER-main/data/price/all_sp500_prices_2000_2024_delisted_include.csv
assets:
- TSLA
- NFLX
- AMZN
- MSFT
indicators:
- sma_5
- sma_10
- rsi_14
- vol_5
global_features:
- cash
- portfolio_value
task_description: 'Legacy baseline rollback: composite scenario-family LESR run using the Step51 design skeleton.'
start_date: '2000-01-03'
end_date: '2024-12-31'
seed: 42
experiment:
  phase: E6
  claim_id: legacy_baseline_revert
  hypothesis_id: h_legacy_composite_step51_skeleton
  frozen: false
eval_protocol: temporal_split
window_setup: composite
benchmark_range:
  start: '2004-01-01'
  end: '2024-01-01'
prior_years_max: 2
days: 252
initial_cash: 100000
max_trade: 1000
fee_rate: 0.001
algorithm: td3
eval_algorithms:
- a2c
- ppo
- sac
- td3
intrinsic_w: 0.02
intrinsic_scale_mode: bounded_100
intrinsic_timing: pre_action_state
intrinsic_postprocess:
  mode: centered
  eps: 1.0e-06
n_small: 40
n_full: 504
warmup_ratio: 0.05
seeds:
- 1
- 2
- 3
- 4
- 5
groups:
- G0_baseline
- G1_revise_only
- G2_intrinsic_only
- G3_revise_intrinsic
algo_tuning:
  a2c:
    ent_coef: 0.005
    n_steps: 32
  ppo:
    ent_coef: 0.005
    n_steps: 64
    batch_size: 64
  sac:
    ent_coef: auto_0.1
    target_entropy: auto
    batch_size: 128
    learning_rate: 0.0002
  td3:
    actor_max_action: 50
    policy_noise: 0.1
    noise_clip: 0.25
    policy_freq: 2
use_finagent_signal: false
finagent_weight: 0.0
universe:
  mode: historical_dynamic
  n_assets: 5
  include_delisted: true
  restrict_to_config_assets: false
  allow_auto_asset_pool: true
  selection_strategy: momentum_factor
  momentum_days: 100
  skip_days: 21
execution:
  decision_price: close_t
  fill_price: open_t1
evaluation:
  eval_freq_mode: relative
  eval_points_min: 5
bootstrap:
  enabled: true
  n_resamples: 2000
  alpha: 0.05
  random_seed: 42
walk_forward:
  enabled: true
  aggregate: mean_std
  min_days_per_split: 20
  windows:
  - train:
      start: '2002-01-01'
      end: '2002-12-31'
    val:
      start: '2003-01-01'
      end: '2003-12-31'
    test:
      start: '2004-01-01'
      end: '2004-12-31'
  - train:
      start: '2004-01-01'
      end: '2004-12-31'
    val:
      start: '2005-01-01'
      end: '2005-12-31'
    test:
      start: '2006-01-01'
      end: '2006-12-31'
  - train:
      start: '2006-01-01'
      end: '2006-12-31'
    val:
      start: '2007-01-01'
      end: '2007-12-31'
    test:
      start: '2008-01-01'
      end: '2008-12-31'
  - train:
      start: '2014-01-01'
      end: '2014-12-31'
    val:
      start: '2015-01-01'
      end: '2015-12-31'
    test:
      start: '2016-01-01'
      end: '2016-12-31'
  - train:
      start: '2020-01-01'
      end: '2020-12-31'
    val:
      start: '2021-01-01'
      end: '2021-12-31'
    test:
      start: '2022-01-01'
      end: '2022-12-31'
td3:
  start_timesteps: 100
  batch_size: 64
  expl_noise: 0.1
  discount: 0.99
  tau: 0.005
  policy_noise: 0.1
  noise_clip: 0.25
  policy_freq: 2
  hidden_dim: 256
  state_norm:
    mode: zscore
    eps: 1.0e-06
    log_volume: true
  actor_max_action: 50
llm:
  enabled: true
  base_url: https://api.deepseek.com
  model: deepseek-chat
  temperature: 0.2
  max_tokens: 3500
  request_timeout_s: 90
  k: 3
  iterations: 10
  iteration_mode: per_algorithm_branches
  branch_parallel_workers: 4
  max_retries: 4
  use_env_proxy: false
  max_failed_calls: 16
  candidate_scoring:
    performance_mode: delta_to_g0
    performance_metric: sharpe
    performance_weight: 1.0
    lipschitz_weight: 0.2
    lipschitz_quantile: 0.9
    lipschitz_max_pairs: 256
    selection_seed_count: 2
  generation_target: scenario_family
  scenario_family:
    enabled: true
    families:
    - trend_follow
    - mean_revert
    - risk_shield
    candidates_per_family_per_iter: 1
  system_prompt_mode: trading_lesr_prior_v1
  system_prompt_disable_priors: false
  system_prompt_extra: Generate scenario-specialized families for composite momentum-selected windows; keep action-sensitive terms and smooth risk gates.
sb3:
  total_timesteps: 504
  learning_rate: 0.0003
  gamma: 0.99
  batch_size: 64
  ent_coef: 0.0
  eval_episodes: 1
diagnostics:
  dump_sb3_action_trace: true
  robust_ratio_floor: 1.0
