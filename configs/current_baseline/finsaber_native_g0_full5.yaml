data_source: finsaber
finsaber_price_path: ../复现/FINSABER-main/data/price/all_sp500_prices_2000_2024_delisted_include.csv
assets:
  - TSLA
  - NFLX
  - AMZN
  - MSFT
indicators: [sma_5, sma_10, rsi_14, vol_5]
global_features: [cash, portfolio_value]
task_description: "FINSABER-native DRL baseline on 5 aligned long windows, G0 only."
start_date: "2000-01-03"
end_date: "2024-12-31"
seed: 42

experiment:
  phase: E8
  claim_id: finsaber_native_g0_full5
  hypothesis_id: h_finsaber_native_g0_full5
  frozen: false

eval_protocol: temporal_split
window_setup: selected_4
benchmark_range:
  start: "2014-01-01"
  end: "2024-01-01"
prior_years_max: 3

days: 252
initial_cash: 100000
max_trade: 1000
fee_rate: 0.001

algorithm: td3
eval_algorithms: [a2c, ppo, sac, td3]
groups: [G0_baseline]

intrinsic_w: 0.02
intrinsic_scale_mode: bounded_100
intrinsic_timing: pre_action_state
n_small: 40
n_full: 504
warmup_ratio: 0.05
seeds: [1, 2, 3, 4, 5]

use_finagent_signal: false
finagent_weight: 0.0

universe:
  mode: historical_dynamic
  n_assets: 5
  include_delisted: true
  restrict_to_config_assets: false
  allow_auto_asset_pool: true
  selection_strategy: momentum_factor
  momentum_days: 100
  skip_days: 21

execution:
  drl_backend: finsaber_native
  decision_price: close_t
  fill_price: open_t1
  finsaber_native:
    hmax: 1000
    buy_cost_pct: 0.0049
    sell_cost_pct: 0.0049
    reward_scaling: 1.0e-4
    use_turbulence: true
    use_vix: false
    deterministic_eval: true
    eval_episodes: 1
    print_verbosity: 10

evaluation:
  eval_freq_mode: relative
  eval_points_min: 5

bootstrap:
  enabled: true
  n_resamples: 2000
  alpha: 0.05
  random_seed: 42

walk_forward:
  enabled: true
  aggregate: mean_std
  min_days_per_split: 20
  windows:
    - train:
        start: "2011-01-01"
        end: "2012-12-31"
      val:
        start: "2013-01-01"
        end: "2013-12-31"
      test:
        start: "2014-01-01"
        end: "2015-12-31"
    - train:
        start: "2013-01-01"
        end: "2014-12-31"
      val:
        start: "2015-01-01"
        end: "2015-12-31"
      test:
        start: "2016-01-01"
        end: "2017-12-31"
    - train:
        start: "2015-01-01"
        end: "2016-12-31"
      val:
        start: "2017-01-01"
        end: "2017-12-31"
      test:
        start: "2018-01-01"
        end: "2019-12-31"
    - train:
        start: "2017-01-01"
        end: "2018-12-31"
      val:
        start: "2019-01-01"
        end: "2019-12-31"
      test:
        start: "2020-01-01"
        end: "2021-12-31"
    - train:
        start: "2019-01-01"
        end: "2020-12-31"
      val:
        start: "2021-01-01"
        end: "2021-12-31"
      test:
        start: "2022-01-01"
        end: "2023-12-31"

td3:
  start_timesteps: 100
  batch_size: 64
  expl_noise: 0.1
  discount: 0.99
  tau: 0.005
  policy_noise: 0.1
  noise_clip: 0.25
  policy_freq: 2
  hidden_dim: 256

llm:
  enabled: false
  model: disabled
  k: 0
  iterations: 0

sb3:
  total_timesteps: 504
  learning_rate: 0.0003
  gamma: 0.99
  batch_size: 64
  ent_coef: 0.0
  eval_episodes: 1

diagnostics:
  dump_sb3_action_trace: true
  robust_ratio_floor: 1.0
