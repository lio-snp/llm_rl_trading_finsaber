    - train:
        start: "2020-07-01"
        end: "2021-12-31"
      val:
        start: "2022-01-01"
        end: "2022-03-31"
      test:
        start: "2022-04-01"
        end: "2022-06-30"
    - train:
        start: "2020-10-01"
        end: "2022-03-31"
      val:
        start: "2022-04-01"
        end: "2022-06-30"
      test:
        start: "2022-07-01"
        end: "2022-09-30"
    - train:
        start: "2021-01-01"
        end: "2022-06-30"
      val:
        start: "2022-07-01"
        end: "2022-09-30"
