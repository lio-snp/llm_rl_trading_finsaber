        start: "2023-10-01"
        end: "2023-12-31"
td3:
  start_timesteps: 100
  batch_size: 64
  expl_noise: 0.1
  discount: 0.99
  tau: 0.005
  policy_noise: 0.1
  noise_clip: 0.25
  policy_freq: 2
  hidden_dim: 256
  state_norm:
    mode: zscore
    eps: 1.0e-06
    log_volume: true
  actor_max_action: 50
llm:
  enabled: true
  base_url: https://api.deepseek.com
  model: deepseek-chat
  temperature: 0.2
  max_tokens: 3500
  request_timeout_s: 90
  k: 2
  iterations: 6
  iteration_mode: per_algorithm_branches
  branch_parallel_workers: 3
  max_retries: 4
  use_env_proxy: false
  max_failed_calls: 16
  consensus_promotion:
    support_min: 1
  candidate_scoring:
    performance_mode: delta_to_g0
    performance_metric: score
    performance_weight: 1.0
    lipschitz_weight: 0.2
    lipschitz_quantile: 0.9
    lipschitz_max_pairs: 256
    selection_seed_count: 2
  generation_target: scenario_family
  scenario_family:
    enabled: true
    families:
      - trend_follow
      - mean_revert
      - risk_shield
    candidates_per_family_per_iter: 1
  system_prompt_mode: trading_lesr_prior_v1
  system_prompt_disable_priors: false
  system_prompt_extra: "Short-window refresh smoke on 2019-2023 quarterly walk-forward. Use per-algorithm independent G1/G2/G3 promotion objectives; select each algo's cores from its own history only; allow support_min=1 for per-algo promotion. Keep td3 included under the continuous-action penalty setup."
sb3:
  total_timesteps: 504
  learning_rate: 0.0003
  gamma: 0.99
  batch_size: 64
  ent_coef: 0.0
  eval_episodes: 1
diagnostics:
  dump_sb3_action_trace: true
  robust_ratio_floor: 1.0
