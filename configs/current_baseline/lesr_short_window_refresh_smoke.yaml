data_source: finsaber
finsaber_price_path: ../复现/FINSABER-main/data/price/all_sp500_prices_2000_2024_delisted_include.csv
assets:
  - TSLA
  - NFLX
  - AMZN
  - MSFT
indicators:
  - sma_5
  - sma_10
  - rsi_14
  - vol_5
global_features:
  - cash
  - portfolio_value
task_description: "lesr_short_window_refresh_smoke: quarterly LESR refresh proxy on 2019-2023 with 18m train, 3m val, 3m test, step 3m."
start_date: "2000-01-03"
end_date: "2024-12-31"
seed: 42
experiment:
  phase: E6
  claim_id: lesr_short_window_refresh_smoke
  hypothesis_id: h_lesr_short_window_refresh_smoke
  frozen: false
eval_protocol: temporal_split
window_setup: selected_4
benchmark_range:
  start: "2019-01-01"
  end: "2024-01-01"
prior_years_max: 3
days: 252
initial_cash: 100000
max_trade: 1000
fee_rate: 0.001
algorithm: td3
eval_algorithms:
  - a2c
  - ppo
  - sac
  - td3
intrinsic_w: 0.02
intrinsic_w_schedule:
  - 0.02
intrinsic_scale_mode: bounded_100
intrinsic_timing: pre_action_state
intrinsic_postprocess:
  mode: centered
  eps: 1.0e-06
n_small: 40
n_full: 504
warmup_ratio: 0.05
seeds:
  - 1
  - 2
  - 3
groups:
  - G0_baseline
  - G1_revise_only
  - G2_intrinsic_only
  - G3_revise_intrinsic
algo_tuning:
  a2c:
    ent_coef: 0.005
    n_steps: 32
  ppo:
    ent_coef: 0.005
    n_steps: 64
    batch_size: 64
  sac:
    ent_coef: auto_0.1
    target_entropy: auto
    batch_size: 128
    learning_rate: 0.0002
  td3:
    actor_max_action: 50
    policy_noise: 0.1
    noise_clip: 0.25
    policy_freq: 2
use_finagent_signal: false
finagent_weight: 0.0
universe:
  mode: historical_dynamic
  n_assets: 5
  include_delisted: true
  restrict_to_config_assets: false
  allow_auto_asset_pool: true
  selection_strategy: momentum_factor
  momentum_days: 100
  skip_days: 21
execution:
  decision_price: close_t
  fill_price: open_t1
  continuous_action_bound_penalty:
    coef: 0.05
    threshold: 0.8
    power: 2.0
evaluation:
  eval_freq_mode: relative
  eval_points_min: 5
bootstrap:
  enabled: true
  n_resamples: 2000
  alpha: 0.05
  random_seed: 42
walk_forward:
  enabled: true
  aggregate: mean_std
  min_days_per_split: 20
  windows:
    - train:
        start: "2019-01-01"
        end: "2020-06-30"
      val:
        start: "2020-07-01"
        end: "2020-09-30"
      test:
        start: "2020-10-01"
        end: "2020-12-31"
    - train:
        start: "2019-04-01"
        end: "2020-09-30"
      val:
        start: "2020-10-01"
        end: "2020-12-31"
      test:
        start: "2021-01-01"
